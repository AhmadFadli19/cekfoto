services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cekfoto-app
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "composer install --no-interaction && php artisan migrate --force && php-fpm"
    volumes:
      - ./:/var/www
    ports:
      - "9000:9000"

  nginx:
    image: nginx:alpine
    container_name: cekfoto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app